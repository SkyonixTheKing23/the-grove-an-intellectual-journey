/* ============================================================
   WEB AUDIO SOUND ENGINE — no external files needed
============================================================ */
const AudioCtx = window.AudioContext || window.webkitAudioContext;
let ctx = null;

function getCtx() {
  if (!ctx) ctx = new AudioCtx();
  return ctx;
}

function playTone(freq, type, duration, gain, fadeOut) {
  try {
    const ac  = getCtx();
    const osc = ac.createOscillator();
    const gn  = ac.createGain();
    osc.connect(gn); gn.connect(ac.destination);
    osc.type = type || 'square';
    osc.frequency.setValueAtTime(freq, ac.currentTime);
    gn.gain.setValueAtTime(gain || 0.12, ac.currentTime);
    if (fadeOut) gn.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + duration);
    osc.start(ac.currentTime);
    osc.stop(ac.currentTime + duration);
  } catch(e) {}
}

function playChord(freqs, type, duration, gain) {
  freqs.forEach(f => playTone(f, type, duration, (gain||0.08)/freqs.length, true));
}

// Individual sound effects
const sounds = {
  // Short pixel blip for dialogue advance
  blip: () => {
    playTone(880, 'square', 0.06, 0.1, true);
    setTimeout(() => playTone(1100, 'square', 0.05, 0.08, true), 40);
  },
  // Slightly different blip for question option select
  select: () => {
    playTone(660, 'square', 0.05, 0.1, true);
    setTimeout(() => playTone(990, 'square', 0.07, 0.09, true), 30);
  },
  // Gentle chime for scene transitions (between question sets)
  chime: () => {
    playTone(523, 'sine', 0.18, 0.1, true);
    setTimeout(() => playTone(659, 'sine', 0.18, 0.09, true), 80);
    setTimeout(() => playTone(784, 'sine', 0.22, 0.08, true), 160);
  },
  // Fanfare arpeggio for result reveal
  fanfare: () => {
    const notes = [523, 659, 784, 1047];
    notes.forEach((f, i) => setTimeout(() => playTone(f, 'sine', 0.25, 0.1, true), i * 90));
    setTimeout(() => playChord([523,659,784], 'sine', 0.5, 0.18), 420);
  },
  // Woosh for character intro
  whoosh: () => {
    try {
      const ac = getCtx();
      const buf = ac.createBuffer(1, ac.sampleRate * 0.25, ac.sampleRate);
      const data = buf.getChannelData(0);
      for (let i = 0; i < data.length; i++) data[i] = (Math.random() * 2 - 1) * (1 - i / data.length);
      const src = ac.createBufferSource();
      src.buffer = buf;
      const flt = ac.createBiquadFilter();
      flt.type = 'bandpass'; flt.frequency.value = 1200; flt.Q.value = 0.5;
      const gn = ac.createGain();
      gn.gain.setValueAtTime(0.18, ac.currentTime);
      gn.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + 0.25);
      src.connect(flt); flt.connect(gn); gn.connect(ac.destination);
      src.start(); src.stop(ac.currentTime + 0.25);
    } catch(e) {}
  },
};

   STATE
============================================================ */
let currentScene = 0;
let skyFrame = 0, pexFrame = 0;
let spriteTimer = null;

/* ============================================================
   THEME SWITCHER
============================================================ */
function setTheme(who) {
  // who = 'skyonix' | 'pexxelina' | 'both' | null
  document.body.classList.remove('theme-skyonix', 'theme-pexxelina');
  if (who === 'pexxelina') {
    document.body.classList.add('theme-pexxelina');
  } else {
    // skyonix, both, title, questions — all stay green
    document.body.classList.add('theme-skyonix');
  }
}

/* ============================================================
   SPRITE HELPERS
============================================================ */
function renderSprite(scene, imageDiv) {
  clearInterval(spriteTimer);
  imageDiv.innerHTML = "";

  // Switch theme based on who's speaking
  setTheme(scene.sprite || null);

  if (!scene.sprite) return;

  if (scene.sprite === "both") {
    const dual = document.createElement("div");
    dual.className = "dual-sprite";

    const wSky = document.createElement("div");
    wSky.className = "sprite-wrap";
    wSky.innerHTML = skyonixSVG(0);

    const wPex = document.createElement("div");
    wPex.className = "sprite-wrap delay";
    wPex.innerHTML = pexxelinaSVG(0);

    dual.appendChild(wSky);
    dual.appendChild(wPex);
    imageDiv.appendChild(dual);

    if (scene.fadeIn) {
      dual.classList.add("fade-in");
      setTimeout(() => dual.classList.add("show"), 10);
    }

    spriteTimer = setInterval(() => {
      skyFrame ^= 1; pexFrame ^= 1;
      wSky.innerHTML = skyonixSVG(skyFrame);
      wPex.innerHTML = pexxelinaSVG(pexFrame);
    }, 650);

  } else if (scene.sprite === "skyonix") {
    const wrap = document.createElement("div");
    wrap.className = "sprite-wrap";
    wrap.innerHTML = skyonixSVG(0);
    if (scene.fadeIn) { wrap.classList.add("fade-in"); setTimeout(()=>wrap.classList.add("show"),10); }
    imageDiv.appendChild(wrap);
    spriteTimer = setInterval(() => { skyFrame ^= 1; wrap.innerHTML = skyonixSVG(skyFrame); }, 650);

  } else if (scene.sprite === "pexxelina") {
    const wrap = document.createElement("div");
    wrap.className = "sprite-wrap";
    wrap.innerHTML = pexxelinaSVG(0);
    if (scene.fadeIn) { wrap.classList.add("fade-in"); setTimeout(()=>wrap.classList.add("show"),10); }
    imageDiv.appendChild(wrap);
    spriteTimer = setInterval(() => { pexFrame ^= 1; wrap.innerHTML = pexxelinaSVG(pexFrame); }, 650);
  }
}

/* ============================================================
   SHOW SCENE
============================================================ */
function showScene() {
  const scene      = scenes[currentScene];
  const textBox    = document.getElementById("text-box");
  const buttonsDiv = document.getElementById("buttons");
  const imageDiv   = document.getElementById("image");

  textBox.classList.remove("title-font", "question-font", "dialogue-scene", "results-active");
  buttonsDiv.innerHTML = "";

  // Sprite
  renderSprite(scene, imageDiv);

  // Text box classes
  if (scene.isTitle) {
    textBox.classList.add("title-font");
  } else if (scene.type === "question") {
    textBox.classList.add("question-font");
  } else if (!scene.isCreatorNote) {
    textBox.classList.add("dialogue-scene");
  }

  // Speaker tag
  let speakerHTML = "";
  if (scene.speaker === "Skyonix") {
    speakerHTML = `<span class="speaker-tag skyonix">Skyonix</span><br>`;
  } else if (scene.speaker === "Pexxelina") {
    speakerHTML = `<span class="speaker-tag pexxelina">Pexxelina</span><br>`;
  }

  // Text
  if (scene.isCreatorNote) {
    textBox.innerHTML = `<div class="creator-note">${scene.text}</div>`;
  } else if (scene.isTitle) {
    textBox.textContent = scene.text;
  } else {
    textBox.innerHTML = speakerHTML + scene.text;
  }

  // Buttons
  if (scene.type === "dialogue") {
    const btn = document.createElement("button");
    btn.textContent = scene.buttonText || "Next";
    btn.classList.add("dialogue-btn");
    btn.onclick = () => {
      if (scene.sound && sounds[scene.sound]) sounds[scene.sound]();
      currentScene++;
      showScene();
    };
    buttonsDiv.appendChild(btn);

  } else if (scene.type === "question") {
    scene.options.forEach(option => {
      const btn = document.createElement("button");
      btn.textContent = option.text;
      btn.classList.add("question-btn");
      btn.onclick = () => {
        sounds.select();
        option.cats.forEach(cat => { if (scores[cat] !== undefined) scores[cat]++; });
        currentScene++;
        if (currentScene >= scenes.length) showResult();
        else showScene();
      };
      buttonsDiv.appendChild(btn);
    });
  }
}

  buttonsDiv.appendChild(homeBtn);

  const exploreBtn = document.createElement("button");
  exploreBtn.textContent = "Explore All Personalities";
  exploreBtn.onclick = () => { sounds.blip(); showGallery(); };
  buttonsDiv.appendChild(exploreBtn);
}

/* ============================================================
   SHARE CARD
============================================================ */
function openShareCard(data, isSky) {
  // Populate card
  document.getElementById("sc-icon").textContent    = data.icon;
  document.getElementById("sc-name").textContent    = data.name;
  document.getElementById("sc-subtitle").textContent= data.subtitle;
  document.getElementById("sc-trait").textContent   = data.trait;
  document.getElementById("sc-owner").textContent   = isSky ? "✦ Revealed by Skyonix" : "✦ Revealed by Pexxelina";
  document.getElementById("sc-owner").style.color   = isSky ? "#6aaa3a" : "#c080d8";

  // Spawn floating pixel dots
  const dotsEl = document.getElementById("sc-dots");
  dotsEl.innerHTML = "";
  const dotColors = isSky
    ? ["#3a6020","#4a8a28","#5aaa30","#7ec850","#c9a84c"]
    : ["#6030a0","#8040c0","#c060d0","#e080e0","#c9a84c"];
  for (let i = 0; i < 14; i++) {
    const d = document.createElement("div");
    d.className = "sc-dot";
    const sz = [4,6,4,8][i%4];
    d.style.cssText = `
      width:${sz}px; height:${sz}px;
      background:${dotColors[i%dotColors.length]};
      left:${Math.random()*95}%;
      bottom:${Math.random()*30}%;
      animation-duration:${3+Math.random()*4}s;
      animation-delay:${-Math.random()*5}s;
    `;
    dotsEl.appendChild(d);
  }

  // Change card accent colour for Pexxelina results
  const card = document.getElementById("share-card");
  if (isSky) {
    card.style.background = "linear-gradient(135deg,#1a2e0e 0%,#2a4a18 50%,#1a2e0e 100%)";
    card.style.borderColor = "#6aaa3a";
    card.style.boxShadow   = "0 0 40px rgba(106,170,58,0.3),0 8px 32px rgba(0,0,0,0.6)";
    document.querySelector(".sc-grove").style.color = "#6aaa3a";
    document.querySelector(".sc-name").style.color  = "#c8f090";
    document.querySelector(".sc-trait").style.color = "#5a9a3a";
  } else {
    card.style.background = "linear-gradient(135deg,#1a0a2e 0%,#2e1a48 50%,#1a0a2e 100%)";
    card.style.borderColor = "#c060d0";
    card.style.boxShadow   = "0 0 40px rgba(192,96,208,0.3),0 8px 32px rgba(0,0,0,0.6)";
    document.querySelector(".sc-grove").style.color = "#c060d0";
    document.querySelector(".sc-name").style.color  = "#f0c0ff";
    document.querySelector(".sc-trait").style.color = "#9a60c0";
  }

  document.getElementById("share-modal").classList.add("open");
}

function closeShareCard() {
  document.getElementById("share-modal").classList.remove("open");
}

function showToast(msg) {
  const t = document.getElementById("copy-toast");
  t.textContent = msg;
  t.style.display = "block";
  setTimeout(() => { t.style.display = "none"; }, 2200);
}

// Wire up share modal buttons
document.getElementById("close-share-btn").onclick = () => { sounds.blip(); closeShareCard(); };

document.getElementById("copy-link-btn").onclick = () => {
  sounds.blip();
  const url = window.location.href.split("?")[0];
  navigator.clipboard.writeText(url).then(() => showToast("✓ Link copied!")).catch(() => {
    prompt("Copy this link:", url);
  });
};

document.getElementById("copy-text-btn").onclick = () => {
  sounds.blip();
  const name    = document.getElementById("sc-name").textContent;
  const sub     = document.getElementById("sc-subtitle").textContent;
  const trait   = document.getElementById("sc-trait").textContent;
  const owner   = document.getElementById("sc-owner").textContent;
  const text    = `✦ THE GROVE — Intellectual Personality Quiz ✦\n\nMy result: ${name}\n"${sub}"\n\n${trait}\n\n${owner}\n\nTake the quiz: ${window.location.href.split("?")[0]}`;
  navigator.clipboard.writeText(text).then(() => showToast("✓ Result text copied!")).catch(() => {
    prompt("Copy this text:", text);
  });
};

document.getElementById("share-modal").addEventListener("click", (e) => {
  if (e.target === document.getElementById("share-modal")) { sounds.blip(); closeShareCard(); }
});

/* ============================================================
   GALLERY
============================================================ */
function showGallery() {
  clearInterval(spriteTimer);
  const textBox    = document.getElementById("text-box");
  const container  = document.getElementById("container");
  const buttonsDiv = document.getElementById("buttons");
  const imageDiv   = document.getElementById("image");
  const overlay    = document.getElementById("overlay");

  overlay.style.opacity = 0;
  setTheme('skyonix');
  container.classList.remove("results-active");
  textBox.className = "title-font";
  textBox.textContent = "All Twelve Personalities";
  imageDiv.innerHTML = "";
  buttonsDiv.innerHTML = "";

  // Section: Skyonix fields
  const skyLabel = document.createElement("p");
  skyLabel.style.cssText = "font-size:0.8em;color:#3a7a2a;margin:0 auto 10px;font-family:'Space Mono',monospace;";
  skyLabel.textContent = "✦ Skyonix's Paths — Life & Heart";
  buttonsDiv.appendChild(skyLabel);

  const skyGrid = document.createElement("div");
  skyGrid.className = "result-gallery";
  skyGrid.style.borderColor = "#4a7a2a";

  // Section: Pexxelina fields
  const pexLabel = document.createElement("p");
  pexLabel.style.cssText = "font-size:0.8em;color:#8a4a9a;margin:16px auto 10px;font-family:'Space Mono',monospace;";
  pexLabel.textContent = "✦ Pexxelina's Paths — Logic & Creation";
  const pexGrid = document.createElement("div");
  pexGrid.className = "result-gallery";
  pexGrid.style.borderColor = "#9a5aaa";

  Object.entries(resultData).forEach(([key, d]) => {
    const card = document.createElement("div");
    card.className = "result-card";
    if (d.owner === "pexxelina") card.style.borderColor = "#9a5aaa";
    card.innerHTML = `
      <span class="card-icon">${d.icon}</span>
      <div class="card-name">${d.name}</div>
      <div class="card-trait">${d.trait}</div>
    `;
    if (d.owner === "skyonix") skyGrid.appendChild(card);
    else pexGrid.appendChild(card);
  });

  buttonsDiv.appendChild(skyGrid);
  buttonsDiv.appendChild(pexLabel);
  buttonsDiv.appendChild(pexGrid);

  const backBtn = document.createElement("button");
  backBtn.textContent = "← Back to Home";
  backBtn.onclick = () => {
    sounds.blip();
    Object.keys(scores).forEach(k => scores[k] = 0);
    currentScene = 0; skyFrame = 0; pexFrame = 0;
    textBox.className = "";
    showScene();
  };
  buttonsDiv.appendChild(backBtn);
}

/* ============================================================
   INIT
============================================================ */
showScene();

// Viewport height fix
function setVh() {
  document.documentElement.style.setProperty("--vh", `${window.innerHeight * 0.01}px`);
}
window.addEventListener("resize", setVh);
window.addEventListener("load", setVh);
setVh();
</script>
